name: Memory

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  measure-go:
    name: Measure Go
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Start server
        run: cd go && go run main.go &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-java:
    name: Measure Java
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Start server
        run: cd java && java Server.java &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-nodejs:
    name: Measure Node.js
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Start server
        run: cd nodejs && node server.js &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-dotnet:
    name: Measure .NET
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Start server
        run: cd dotnet && dotnet run &
      - name: Wait for ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  report:
    name: Memory Report
    runs-on: ubuntu-latest
    needs: [measure-go, measure-java, measure-nodejs, measure-dotnet]
    steps:
      - name: Write summary
        run: |
          GO_RSS="${{ needs.measure-go.outputs.rss }}"
          JAVA_RSS="${{ needs.measure-java.outputs.rss }}"
          NODE_RSS="${{ needs.measure-nodejs.outputs.rss }}"
          DOTNET_RSS="${{ needs.measure-dotnet.outputs.rss }}"

          {
            echo "## Memory Usage (RSS after startup + 5 warmup requests)"
            echo ""
            echo "| Rank | Language | RSS (KB) | RSS (MB) |"
            echo "|------|----------|----------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            printf "go\t%s\n" "$GO_RSS"
            printf "java\t%s\n" "$JAVA_RSS"
            printf "nodejs\t%s\n" "$NODE_RSS"
            printf "dotnet\t%s\n" "$DOTNET_RSS"
          } | sort -t$'\t' -k2 -n | awk -F'\t' '
            BEGIN { rank=1 }
            {
              lang=$1; kb=$2
              mb=kb/1024
              name = (lang=="go")?"Go":(lang=="java")?"Java":(lang=="nodejs")?"Node.js":".NET"
              printf "| %d | %s | %s | %.1f |\n", rank, name, kb, mb
              rank++
            }
          ' >> "$GITHUB_STEP_SUMMARY"

          {
            echo ""
            echo "> Measured with \`ps -o rss=\` on \`ubuntu-latest\`. Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
