name: Memory

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  measure-go:
    name: Measure Go
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Start server
        run: cd go && go run main.go &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-java:
    name: Measure Java
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Start server
        run: cd java && java Server.java &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-java-native:
    name: Measure Java (Native)
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native image
        run: |
          cd java && javac Server.java && native-image \
            --no-fallback \
            --gc=serial \
            -R:MinHeapSize=512k \
            -R:MaxHeapSize=8m \
            -R:MaxNewSize=2m \
            -march=native \
            --enable-monitoring= \
            -H:+UnlockExperimentalVMOptions \
            -H:DeadlockWatchdogInterval=0 \
            -cp . Server
      - name: Start server
        run: java/server &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-nodejs:
    name: Measure Node.js
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Start server
        run: cd nodejs && node server.js &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-nodejs-bun:
    name: Measure Node.js (Bun)
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Start server
        run: cd nodejs && bun --smol server.js &
      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-dotnet:
    name: Measure .NET
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Start server
        run: cd dotnet && dotnet run &
      - name: Wait for ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  measure-dotnet-aot:
    name: Measure .NET (AOT)
    runs-on: ubuntu-latest
    outputs:
      rss: ${{ steps.measure.outputs.rss }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Publish (Native AOT)
        run: cd dotnet && dotnet publish -r linux-x64 -c Release
      - name: Start server
        run: dotnet/bin/Release/net10.0/linux-x64/publish/server &
      - name: Wait for ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
      - name: Warmup
        run: |
          for i in $(seq 1 5); do
            curl -sf http://localhost:8080/ > /dev/null
          done
      - name: Measure RSS
        id: measure
        run: |
          ACTUAL_PID=$(ss -tlnp 'sport = :8080' 2>/dev/null \
            | grep -oP 'pid=\K[0-9]+' \
            | head -1)
          if [ -z "$ACTUAL_PID" ]; then
            echo "ERROR: could not find PID for port 8080" >&2
            exit 1
          fi
          RSS=$(ps -o rss= -p "$ACTUAL_PID")
          echo "PID=$ACTUAL_PID RSS=${RSS} KB ($(awk "BEGIN{printf \"%.1f\",$RSS/1024}") MB)"
          echo "rss=${RSS}" >> "$GITHUB_OUTPUT"

  report:
    name: Memory Report
    runs-on: ubuntu-latest
    needs: [measure-go, measure-java, measure-java-native, measure-nodejs, measure-nodejs-bun, measure-dotnet, measure-dotnet-aot]
    steps:
      - name: Write summary
        run: |
          GO_RSS="${{ needs.measure-go.outputs.rss }}"
          JAVA_RSS="${{ needs.measure-java.outputs.rss }}"
          JAVA_NATIVE_RSS="${{ needs.measure-java-native.outputs.rss }}"
          NODE_RSS="${{ needs.measure-nodejs.outputs.rss }}"
          NODE_BUN_RSS="${{ needs.measure-nodejs-bun.outputs.rss }}"
          DOTNET_RSS="${{ needs.measure-dotnet.outputs.rss }}"
          DOTNET_AOT_RSS="${{ needs.measure-dotnet-aot.outputs.rss }}"

          {
            echo "## Memory Usage (RSS after startup + 5 warmup requests)"
            echo ""
            echo "| Rank | Language | RSS (KB) | RSS (MB) |"
            echo "|------|----------|----------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            printf "go\t%s\n" "$GO_RSS"
            printf "java\t%s\n" "$JAVA_RSS"
            printf "java-native\t%s\n" "$JAVA_NATIVE_RSS"
            printf "nodejs\t%s\n" "$NODE_RSS"
            printf "nodejs-bun\t%s\n" "$NODE_BUN_RSS"
            printf "dotnet\t%s\n" "$DOTNET_RSS"
            printf "dotnet-aot\t%s\n" "$DOTNET_AOT_RSS"
          } | sort -t$'\t' -k2 -n | awk -F'\t' '
            BEGIN { rank=1 }
            {
              lang=$1; kb=$2
              mb=kb/1024
              name = (lang=="go")?"Go":(lang=="java")?"Java":(lang=="java-native")?"Java (Native)":(lang=="nodejs")?"Node.js":(lang=="nodejs-bun")?"Node.js (Bun)":(lang=="dotnet")?".NET":".NET (AOT)"
              printf "| %d | %s | %s | %.1f |\n", rank, name, kb, mb
              rank++
            }
          ' >> "$GITHUB_STEP_SUMMARY"

          {
            echo ""
            echo "> Measured with \`ps -o rss=\` on \`ubuntu-latest\`. Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
