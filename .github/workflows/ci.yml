name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Start server
        run: cd go && go run main.go &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Start server
        run: cd java && java Server.java &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  java-native:
    name: Java (Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native image
        run: |
          cd java && javac Server.java && native-image \
            --no-fallback \
            --gc=serial \
            -R:MinHeapSize=512k \
            -R:MaxHeapSize=8m \
            -R:MaxNewSize=2m \
            -march=native \
            --enable-monitoring= \
            -H:+UnlockExperimentalVMOptions \
            -H:DeadlockWatchdogInterval=0 \
            -cp . Server
      - name: Start server
        run: java/server &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  nodejs:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Start server
        run: cd nodejs && node server.js &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  nodejs-bun:
    name: Node.js (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Start server
        run: cd nodejs && bun --smol server.js &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Start server
        run: cd dotnet && dotnet run &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  dotnet-aot:
    name: .NET (AOT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Publish (Native AOT)
        run: cd dotnet && dotnet publish -r linux-x64 -c Release
      - name: Start server
        run: dotnet/bin/Release/net10.0/linux-x64/publish/server &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
