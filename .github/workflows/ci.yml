name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Start server
        run: cd go && go run main.go &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Start server
        run: cd java && java Server.java &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  nodejs:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Start server
        run: cd nodejs && node server.js &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Start server
        run: cd dotnet && dotnet run &
      - name: Verify HTTP 200
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✓ Server is up"
              curl -si http://localhost:8080/ | head -1
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server did not respond in time"
          exit 1
